name: "CI"

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions: read-all

jobs:
  hugo-build:
    name: Hugo Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Clone project
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3.0.0
        with:
          hugo-version: "latest"

      - name: Hugo build
        run: hugo --minify

      - name: Upload html artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: html
          path: public

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: hugo-build
    permissions:
      contents: read
      packages: read

    steps:
      - name: Clone project
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Download html
        uses: actions/download-artifact@v8.0.1
        with:
          name: html
          path: public

      - name: Configure docker buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Build docker image
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: hugo-build

    permissions:
      # contents permission to clone the repository
      contents: read
      packages: read
      # issues and pull-requests permissions to write results as pull
      # request comments. Omit them if you don't need summary comments
      issues: write
      pull-requests: write
      # To report GitHub Actions status checks. Omit if you don't need
      # to update commit status
      statuses: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          # super-linter needs the full git history to get the
          # list of files that changed across commits
          fetch-depth: 0
          persist-credentials: false

      - name: Download html
        uses: actions/download-artifact@v8.0.1
        with:
          name: html
          path: public

      - name: Super-linter
        uses: super-linter/super-linter@v8.6.0
        env:
          # To report GitHub Actions status checks
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No Go source files in this repo (go.mod is for Hugo Modules)
          VALIDATE_GO_MODULES: false
